name: check source-code with ruff

on: 
  push:
  workflow_dispatch:
  pull_request:

permissions: 
  contents: write
  
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref || 'master' }}
          fetch-depth: 0
          persist-credentials: true
      - name: run ruff check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check --fix"
      - name: run ruff format
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "format"
      - name: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "ci: format commits"
